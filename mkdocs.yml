site_name: 누리메이트 전략 문서
site_description: 누리메이트 제품 전략, 시장 리서치, 기능 스펙
site_url: https://sweetginger.github.io/nurymate-docs/

docs_dir: docs
site_dir: site

theme:
  name: material
  language: ko
  palette:
    primary: indigo
    accent: indigo
  features:
    - navigation.tabs
    - navigation.instant
    - navigation.top
    - navigation.sections
    - search.highlight
    - search.suggest
    - content.code.copy

plugins:
  - search:
      lang:
        - ko
        - ja

markdown_extensions:
  - tables
  - toc:
      permalink: true
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - 개요: index.md
  - 전략:
    - 제품 기획: strategy/product-plan.md
    - 비즈니스 로드맵: strategy/business-roadmap.md
    - 전략 분석: strategy/strategic-analysis.md
    - 수익 구조: strategy/pricing-model.md
    - 초기 고객 확보: strategy/early-customer-acquisition.md
    - 신규 창업자 확보: strategy/new-seller-acquisition.md
